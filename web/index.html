<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WP Security Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-shield"></div>
                <h2>WP Scanner</h2>
            </div>
            
            <nav class="nav-menu">
                <a href="#" class="nav-item active">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Dashboard
                </a>
                <a href="#" class="nav-item">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    Reports
                </a>
                <a href="#" class="nav-item">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Settings
                </a>
            </nav>
            
            <div class="server-status">
                <div class="status-indicator online"></div>
                <span>API Server Online</span>
            </div>
        </aside>

        <main class="content-area">
            <header class="top-nav">
                <h1>Overview</h1>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=10b981&color=fff" alt="Admin">
                </div>
            </header>

            <div class="dashboard-grid">
                <!-- Monthly Overview Chart Widget -->
                <div class="card widget-chart">
                    <div class="card-header">
                        <h3>Monthly Vulnerability Trend</h3>
                        <p class="subtitle">Aggregated severity counts across all targets</p>
                    </div>
                    <div class="card-body chart-container">
                        <canvas id="monthlyChart"></canvas>
                    </div>
                </div>

                <!-- Run Scan Widget -->
                <div class="card widget-action">
                    <div class="card-header">
                        <h3>Run New Scan</h3>
                        <p class="subtitle">Trigger a background analysis</p>
                    </div>
                    <div class="card-body">
                        <form id="scanForm" class="scan-form">
                            <div class="form-group">
                                <label for="targetUrl">Target URL</label>
                                <input type="text" id="targetUrl" placeholder="https://example.com" required>
                            </div>
                            <div class="form-group">
                                <label for="scanMode">Scan Mode</label>
                                <div class="custom-select">
                                    <select id="scanMode">
                                        <option value="passive">Passive (Safe Recon)</option>
                                        <option value="active">Active (Deep Testing)</option>
                                        <option value="full">Full (Both)</option>
                                    </select>
                                </div>
                            </div>
                            <button type="submit" class="btn-primary" id="startScanBtn">
                                <span>Initiate Sequence</span>
                                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                            </button>
                            <div id="scanStatus" class="status-message hidden"></div>
                        </form>
                    </div>
                </div>

                <!-- Recent Targets Widget -->
                <div class="card widget-targets">
                    <div class="card-header">
                        <h3>Known Targets</h3>
                    </div>
                    <div class="card-body">
                        <ul class="target-list" id="targetList">
                            <!-- Populated by JS -->
                            <li class="loading-text">Loading targets...</li>
                        </ul>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
